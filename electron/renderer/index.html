<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://accounts.google.com; img-src 'self' data: https:;">
  <title>brain²</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kalam:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FAFAF7;
      color: #111;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: drag;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 16px;
      padding: 40px 44px;
      width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
      -webkit-app-region: no-drag;
    }
    .logo {
      font-family: 'Kalam', cursive; font-weight: 700;
      font-size: 32px; margin-bottom: 8px;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p { color: #5A5A5A; line-height: 1.55; margin: 0 0 22px; font-size: 14px; }
    button {
      font: inherit; border: 0; cursor: pointer; border-radius: 999px;
      padding: 11px 22px; font-weight: 500; font-size: 14px;
    }
    .primary { background: #111; color: #fff; }
    .primary:hover { background: #333; }
    .primary:disabled { background: #ccc; cursor: not-allowed; }
    .secondary { background: transparent; color: #111; border: 1px solid rgba(17,17,17,0.15); }
    .secondary:hover { background: rgba(17,17,17,0.04); }
    .row { display: flex; gap: 10px; align-items: center; }
    .field { width: 100%; padding: 9px 12px; font: inherit; font-size: 14px;
             border: 1px solid rgba(17,17,17,0.15); border-radius: 8px; }
    .step-dots { display: flex; gap: 6px; margin-bottom: 18px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(17,17,17,0.15); }
    .dot.active { background: #111; }
    .dot.done { background: #7BC47F; }
    .info { color: #5A5A5A; font-size: 12px; margin-top: 12px; }
    .err { color: #E86B5A; font-size: 13px; margin-top: 8px; }
    .ok  { color: #1a7a50; font-size: 13px; margin-top: 8px; }
    .vault-path {
      flex: 1; padding: 8px 10px; border-radius: 6px;
      background: #F0EEE8; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .actions { margin-top: 26px; display: flex; justify-content: space-between; }
    .actions.center { justify-content: center; }
    .google-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
    }
    .google-icon {
      width: 18px; height: 18px; display: inline-block;
      background: conic-gradient(from 0deg, #4285F4, #34A853, #FBBC05, #EA4335, #4285F4);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="step-dots" id="dots"></div>
    <div id="content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.0/dist/umd/supabase.min.js"></script>
  <script src="./onboarding.js"></script>
</body>
</html>
