agent: claude-code

server:
  host: 127.0.0.1
  port: 3000
  auto_open_browser: true

vault:
  path: /absolute/path/to/vault
  daily_folder: daily
  core_folder: core
  references_folder: references
  thoughts_folder: thoughts
  system_folder: system

session:
  single_session: true
  history_turn_limit: 10
  summarize_on_end: true
  auto_save_summary: true
  inactivity_timeout_seconds: 120

agents:
  claude-code:
    command: claude
    args:
      - -p
      - --output-format
      - stream-json
      - --verbose
      - --model
      - claude-sonnet-4-6
    allowed_tools:
      - Read
      - Edit
      - Bash
      - Glob
      - Grep
      - mcp__google__list_emails
      - mcp__google__search_emails
      - mcp__google__get_email
      - mcp__google__get_events
      - mcp__google__get_todays_events
      - mcp__github__*
      - mcp__notion__*
      - mcp__linear__*
      - mcp__slack__*

  codex:
    command: codex
    args:
      - exec
      - --json
      - --sandbox
      - workspace-write

integrations:
  enable_daily_context: true
  include_in_prompt: false
